<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Quality List</title>
    <style>
        :root {
            --bg-color: #11141a;
            --panel-bg: #181d26;
            --accent-color: #3b82f6;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #242b38;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
            gap: 30px;
        }

        /* 왼쪽 순위 리스트 섹션 */
        .list-section {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            height: fit-content;
        }

        /* 리스트 아이템 구조 */
        .list-item {
            display: flex;
            align-items: center;
            padding: 18px 25px; /* 안쪽 여백을 넓혀서 더 시원하게 변경 */
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
            gap: 20px;
        }

        .list-item:hover, .list-item.active {
            background-color: #1e2530;
        }

        .rank {
            font-size: 18px;
            font-weight: bold;
            width: 45px;
            color: var(--accent-color);
            text-align: center;
        }

        /* ⭐ 썸네일 박스 크기 대폭 확대 (80x45 -> 140x78) */
        .list-thumbnail {
            width: 140px;
            height: 78px;
            background-color: #000;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #2e3848;
            flex-shrink: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .list-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .map-info {
            flex: 1;
        }

        .map-name {
            font-weight: bold;
            font-size: 18px; /* 글씨 크기 키움 */
            margin-bottom: 4px;
        }

        .map-creator {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 오른쪽 상세 정보창 */
        .detail-section {
            width: 480px;
            position: sticky;
            top: 30px;
            height: fit-content;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 25px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* ⭐ 아무것도 선택 안 되었을 때 띄울 안내 메시지 스타일 */
        .placeholder-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 6px;
            background-color: #000;
            margin-bottom: 20px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .detail-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .detail-creator {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-top: 15px;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .info-value {
            font-size: 16px;
            font-weight: bold;
            margin-top: 2px;
        }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .detail-section { width: auto; position: static; }
        }
    </style>
</head>
<body>

    <header>
        <h1>GD QUALITY LIST</h1>
        <div style="font-size: 14px; color: var(--text-muted);">TOP QUALITY MAPS</div>
    </header>

    <div class="container">
        <div class="list-section" id="mapList"></div>

        <div class="detail-section">
            <div class="panel" id="detailPanel">
                <div class="placeholder-text">
                    👈 순위표에서 맵을 선택하면<br>상세 정보와 영상을 볼 수 있습니다!
                </div>
            </div>
        </div>
    </div>

    <script>
        // 맵 데이터 (원하는 유튜브 주소창 링크를 그대로 복사해서 넣으시면 됩니다)
        const mapData = [
            {
                rank: 1,
                name: "Acheron",
                creator: "Riot & more",
                difficulty: "Extreme Demon",
                publisher: "Riot",
                videoUrl: "https://www.youtube.com/watch?v=Sg3NfK1T7p4", 
                description: "현재 비주얼과 게임플레이 퀄리티 밸런스가 가장 뛰어난 최상위 맵입니다."
            },
            {
                rank: 2,
                name: "Slaughterhouse",
                creator: "IcedCave",
                difficulty: "Extreme Demon",
                publisher: "SpaceUK",
                videoUrl: "https://www.youtube.com/watch?v=eXbN8Lp_R84",
                description: "압도적인 분위기와 다크한 헬스타일 연출이 돋보이는 명작입니다."
            },
            {
                rank: 3,
                name: "Limbo",
                creator: "MindCap & More",
                difficulty: "Extreme Demon",
                publisher: "MindCap",
                videoUrl: "https://www.youtube.com/watch?v=fA8S_7vXg6M",
                description: "기믹과 이펙트의 끝판왕. 지메 역사상 가장 창의적인 맵 중 하나입니다."
            }
        ];

        // 유튜브 링크 분석기 (썸네일 주소 추출용)
        function getYoutubeThumbnail(url) {
            try {
                let videoId = '';
                if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                } else if (url.includes('youtube.com/embed/')) {
                    videoId = url.split('youtube.com/embed/')[1].split(/[?#]/)[0];
                } else if (url.includes('v=')) {
                    videoId = url.split('v=')[1].split('&')[0];
                } else {
                    videoId = url;
                }
                return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            } catch (e) {
                return 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="78" style="background:%23181d26;"></svg>';
            }
        }

        // 유튜브 링크 분석기 (오른쪽 영상 재생용 임베드 주소 변환)
        function convertToEmbedUrl(url) {
            try {
                let videoId = '';
                if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                } else if (url.includes('youtube.com/embed/')) {
                    return url;
                } else if (url.includes('v=')) {
                    videoId = url.split('v=')[1].split('&')[0];
                } else {
                    videoId = url;
                }
                return `https://www.youtube.com/embed/${videoId}`;
            } catch (e) {
                return url;
            }
        }

        function renderList() {
            const listContainer = document.getElementById('mapList');
            listContainer.innerHTML = '';

            mapData.forEach((map, index) => {
                const item = document.createElement('div');
                // 기존의 첫 번째 아이템 강제 활성화(active) 클래스 제거
                item.className = 'list-item';
                
                const thumbUrl = getYoutubeThumbnail(map.videoUrl);

                item.innerHTML = `
                    <div class="rank">#${map.rank}</div>
                    <div class="list-thumbnail">
                        <img src="${thumbUrl}" alt="${map.name} thumbnail">
                    </div>
                    <div class="map-info">
                        <div class="map-name">${map.name}</div>
                        <div class="map-creator">${map.creator}</div>
                    </div>
                `;
                
                // 클릭하면 활성화 표시를 주고 상세 정보창을 띄우는 이벤트
                item.addEventListener('click', () => {
                    document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    showDetail(map);
                });

                listContainer.appendChild(item);
            });
        }

        // 맵 정보를 우측 판넬에 꽂아주는 함수
        function showDetail(map) {
            const detailPanel = document.getElementById('detailPanel');
            const embedUrl = convertToEmbedUrl(map.videoUrl);
            
            // 중앙 정렬 풀고 본문 내용 배치
            detailPanel.style.justifyContent = 'flex-start';
            detailPanel.innerHTML = `
                <div class="video-container">
                    <iframe src="${embedUrl}" allowfullscreen></iframe>
                </div>
                <div class="detail-title">${map.name}</div>
                <div class="detail-creator">By ${map.creator}</div>
                <p style="font-size: 14px; line-height: 1.6; color: var(--text-color); margin: 0 0 20px 0;">${map.description}</p>
                
                <div class="info-grid">
                    <div>
                        <div class="info-label">난이도</div>
                        <div class="info-value" style="color: #ef4444;">${map.difficulty}</div>
                    </div>
                    <div>
                        <div class="info-label">퍼블리셔</div>
                        <div class="info-value">${map.publisher}</div>
                    </div>
                </div>
            `;
        }

        renderList();
        // 초기 자동 호출 코드 제거 -> 사용자가 직접 클릭해야 정보창이 뜸!
    </script>
</body>
</html>
