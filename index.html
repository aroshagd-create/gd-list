<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Quality List</title>
    <style>
        :root {
            --bg-color: #11141a;
            --panel-bg: #181d26;
            --accent-color: #3b82f6;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #242b38;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        .container {
            max-width: 1000px; /* 오른쪽 창이 없으므로 보기 편하게 가로폭을 최적화 */
            margin: 30px auto;
            padding: 0 20px;
        }

        /* 순위 리스트 메인 섹션 */
        .list-section {
            background-color: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            width: 100%;
        }

        /* 리스트 한 칸의 스타일 */
        .list-item {
            border-bottom: 1px solid var(--border-color);
            padding: 20px 25px;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        /* 상단 항상 보이는 기본 정보 줄 */
        .item-main-row {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .rank {
            font-size: 20px;
            font-weight: bold;
            width: 45px;
            color: var(--accent-color);
            text-align: center;
        }

        /* 큼직한 썸네일 스타일 */
        .list-thumbnail {
            width: 180px;
            height: 101px;
            background-color: #000;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #2e3848;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        /* 썸네일에 마우스 올리면 유튜브 느낌 나게 빨간 테두리 효과 */
        .list-thumbnail:hover {
            transform: scale(1.03);
            border-color: #ef4444; 
        }

        .list-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 클릭해서 상세 정보를 여는 글자 영역 */
        .map-info-click-area {
            flex: 1;
            cursor: pointer;
            padding: 15px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .map-info-click-area:hover, .list-item.active .map-info-click-area {
            background-color: #222936;
        }

        .map-name {
            font-weight: bold;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .map-creator {
            font-size: 15px;
            color: var(--text-muted);
        }

        /* ⭐ 제목을 누르면 아래로 펼쳐지는 상세 정보창 */
        .item-detail-box {
            display: none; /* 기본 상태는 숨김 */
            background-color: #131820;
            border-radius: 6px;
            margin-top: 15px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        /* active 클래스가 붙으면 펼쳐짐 */
        .list-item.active .item-detail-box {
            display: block;
        }

        .map-description {
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 15px 0;
            color: var(--text-color);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .info-value {
            font-size: 16px;
            font-weight: bold;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>GD QUALITY LIST</h1>
        <div style="font-size: 14px; color: var(--text-muted);">TOP QUALITY MAPS</div>
    </header>

    <div class="container">
        <div class="list-section" id="mapList"></div>
    </div>

    <script>
        // 맵 데이터 목록 (유튜브 주소창 링크를 복사해서 편하게 바꿀 수 있습니다)
        const mapData = [
            {
                rank: 1,
                name: "Acheron",
                creator: "Riot & more",
                difficulty: "Extreme Demon",
                publisher: "Riot",
                videoUrl: "https://www.youtube.com/watch?v=Sg3NfK1T7p4", 
                description: "현재 비주얼과 게임플레이 퀄리티 밸런스가 가장 뛰어난 최상위 맵입니다."
            },
            {
                rank: 2,
                name: "Slaughterhouse",
                creator: "IcedCave",
                difficulty: "Extreme Demon",
                publisher: "SpaceUK",
                videoUrl: "https://www.youtube.com/watch?v=eXbN8Lp_R84",
                description: "압도적인 분위기와 다크한 헬스타일 연출이 돋보이는 명작입니다."
            },
            {
                rank: 3,
                name: "Limbo",
                creator: "MindCap & More",
                difficulty: "Extreme Demon",
                publisher: "MindCap",
                videoUrl: "https://www.youtube.com/watch?v=fA8S_7vXg6M",
                description: "기믹과 이펙트의 끝판왕. 지메 역사상 가장 창의적인 맵 중 하나입니다."
            }
        ];

        function getYoutubeThumbnail(url) {
            try {
                let videoId = '';
                if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                } else if (url.includes('youtube.com/embed/')) {
                    videoId = url.split('youtube.com/embed/')[1].split(/[?#]/)[0];
                } else if (url.includes('v=')) {
                    videoId = url.split('v=')[1].split('&')[0];
                } else {
                    videoId = url;
                }
                return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            } catch (e) {
                return 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="180" height="101" style="background:%23181d26;"></svg>';
            }
        }

        function renderList() {
            const listContainer = document.getElementById('mapList');
            listContainer.innerHTML = '';

            mapData.forEach((map) => {
                const item = document.createElement('div');
                item.className = 'list-item';
                
                const thumbUrl = getYoutubeThumbnail(map.videoUrl);

                item.innerHTML = `
                    <div class="item-main-row">
                        <div class="rank">#${map.rank}</div>
                        <div class="list-thumbnail" title="클릭 시 유튜브 영상 새 창 이동">
                            <img src="${thumbUrl}" alt="${map.name} thumbnail">
                        </div>
                        <div class="map-info-click-area" title="클릭 시 맵 상세 정보 보기">
                            <div class="map-name">${map.name}</div>
                            <div class="map-creator">By ${map.creator}</div>
                        </div>
                    </div>
                    <div class="item-detail-box">
                        <p class="map-description">${map.description}</p>
                        <div class="info-grid">
                            <div>
                                <div class="info-label">난이도</div>
                                <div class="info-value" style="color: #ef4444;">${map.difficulty}</div>
                            </div>
                            <div>
                                <div class="info-label">퍼블리셔</div>
                                <div class="info-value">${map.publisher}</div>
                            </div>
                        </div>
                    </div>
                `;
                
                // 1. 🚨 썸네일 클릭: 유튜브 새 창 띄우기
                const thumbBtn = item.querySelector('.list-thumbnail');
                thumbBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); // 제목 클릭 이벤트가 같이 켜지는 것 방지
                    window.open(map.videoUrl, '_blank');
                });

                // 2. 🚨 제목 영역 클릭: 내 자리에 상세 박스 폈다 접었다 하기
                const infoBtn = item.querySelector('.map-info-click-area');
                infoBtn.addEventListener('click', () => {
                    const isActive = item.classList.contains('active');
                    
                    // 다른 펼쳐진 박스들을 다 접고 싶다면 아래 한 줄 주석 해제 (지금은 독립 작동)
                    document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
                    
                    if (!isActive) {
                        item.classList.add('active');
                    }
                });

                listContainer.appendChild(item);
            });
        }

        renderList();
    </script>
</body>
</html>
