<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Quality List</title>
    <style>
        :root {
            --bg-color: #11141a;
            --panel-bg: #181d26;
            --accent-color: #3b82f6;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #242b38;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        .container {
            max-width: 1200px; /* 너무 퍼지지 않게 적당하고 깔끔한 최적 너비 설정 */
            margin: 30px auto;
            padding: 0 20px;
        }

        /* ⭐ 순위 리스트 섹션이 이제 단독으로 화면을 꽉 채웁니다 */
        .list-section {
            background-color: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            width: 100%;
        }

        /* 리스트 아이템 구조 */
        .list-item {
            display: flex;
            align-items: center;
            padding: 20px 30px; /* 더 넓고 시원시원한 여백 */
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            gap: 25px;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item:hover {
            background-color: #1e2530;
            transform: translateX(4px); /* 마우스 올렸을 때 살짝 움직이는 고급스러운 효과 */
        }

        .rank {
            font-size: 20px;
            font-weight: bold;
            width: 50px;
            color: var(--accent-color);
            text-align: center;
        }

        /* 썸네일 박스 크기 유지 */
        .list-thumbnail {
            width: 140px;
            height: 78px;
            background-color: #000;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #2e3848;
            flex-shrink: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .list-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .map-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .map-name-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .map-name {
            font-weight: bold;
            font-size: 20px;
        }

        .map-difficulty {
            font-size: 13px;
            color: #ef4444;
            font-weight: 600;
            background-color: rgba(239, 68, 68, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .map-details {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>GD QUALITY LIST</h1>
        <div style="font-size: 14px; color: var(--text-muted);">TOP QUALITY MAPS</div>
    </header>

    <div class="container">
        <div class="list-section" id="mapList"></div>
    </div>

    <script>
        // 맵 데이터 목록
        const mapData = [
            {
                rank: 1,
                name: "Acheron",
                creator: "Riot & more",
                difficulty: "Extreme Demon",
                publisher: "Riot",
                videoUrl: "https://www.youtube.com/watch?v=Sg3NfK1T7p4", 
                description: "현재 비주얼과 게임플레이 퀄리티 밸런스가 가장 뛰어난 최상위 맵입니다."
            },
            {
                rank: 2,
                name: "Slaughterhouse",
                creator: "IcedCave",
                difficulty: "Extreme Demon",
                publisher: "SpaceUK",
                videoUrl: "https://www.youtube.com/watch?v=eXbN8Lp_R84",
                description: "압도적인 분위기와 다크한 헬스타일 연출이 돋보이는 명작입니다."
            },
            {
                rank: 3,
                name: "Limbo",
                creator: "MindCap & More",
                difficulty: "Extreme Demon",
                publisher: "MindCap",
                videoUrl: "https://www.youtube.com/watch?v=fA8S_7vXg6M",
                description: "기믹과 이펙트의 끝판왕. 지메 역사상 가장 창의적인 맵 중 하나입니다."
            }
        ];

        // 유튜브 링크 분석기 (썸네일 주소 추출용)
        function getYoutubeThumbnail(url) {
            try {
                let videoId = '';
                if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                } else if (url.includes('youtube.com/embed/')) {
                    videoId = url.split('youtube.com/embed/')[1].split(/[?#]/)[0];
                } else if (url.includes('v=')) {
                    videoId = url.split('v=')[1].split('&')[0];
                } else {
                    videoId = url;
                }
                return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            } catch (e) {
                return 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="78" style="background:%23181d26;"></svg>';
            }
        }

        function renderList() {
            const listContainer = document.getElementById('mapList');
            listContainer.innerHTML = '';

            mapData.forEach((map) => {
                const item = document.createElement('div');
                item.className = 'list-item';
                
                const thumbUrl = getYoutubeThumbnail(map.videoUrl);

                // 구조 변경: 리스트 한 줄 안에 맵 정보, 난이도, 퍼블리셔 설명이 전부 깔끔하게 들어가도록 최적화
                item.innerHTML = `
                    <div class="rank">#${map.rank}</div>
                    <div class="list-thumbnail">
                        <img src="${thumbUrl}" alt="${map.name} thumbnail">
                    </div>
                    <div class="map-info">
                        <div class="map-name-row">
                            <div class="map-name">${map.name}</div>
                            <div class="map-difficulty">${map.difficulty}</div>
                        </div>
                        <div class="map-details">
                            <span>By <strong>${map.creator}</strong></span> (Pub: ${map.publisher}) — ${map.description}
                        </div>
                    </div>
                `;
                
                // ⭐ 클릭하면 해당 맵의 유튜브 영상 주소로 새 창에서 즉시 이동!
                item.addEventListener('click', () => {
                    window.open(map.videoUrl, '_blank');
                });

                listContainer.appendChild(item);
            });
        }

        renderList();
    </script>
</body>
</html>
