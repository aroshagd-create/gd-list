<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="rpnE6jyQRrMHiu6hUZwKHoFyUbrr3xN0BpoZedmqbGo" />

    <title>GD Quality Level List - 지메 퀄리티 리스트</title>
    <meta name="description" content="지오메트리 대시 최고 퀄리티 레벨 순위표! 실시간으로 업데이트되는 GD Quality Level List를 확인해 보세요.">
    <meta name="keywords" content="지메, 지오메트리대시, 지메 퀄리티 리스트, 퀄리티 리스트, GD, Geometry Dash, Quality List">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="GD Quality Level List">
    <meta property="og:description" content="지오메트리 대시 최고 퀄리티 레벨 순위표!">
    <meta property="og:url" content="https://gdhqlist.kro.kr">

    <style>
        :root {
            --bg-color: #11141a;
            --panel-bg: #181d26;
            --accent-color: #3b82f6;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #242b38;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .list-section {
            background-color: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            width: 100%;
        }

        .list-item {
            border-bottom: 1px solid var(--border-color);
            padding: 20px 25px;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .item-main-row {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .rank {
            font-size: 20px;
            font-weight: bold;
            width: 45px;
            color: var(--accent-color);
            text-align: center;
        }

        .list-thumbnail {
            width: 180px;
            height: 101px;
            background-color: #000;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #2e3848;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .list-thumbnail:hover {
            transform: scale(1.03);
            border-color: #ef4444; 
        }

        .list-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .map-info-click-area {
            flex: 1;
            cursor: pointer;
            padding: 20px 15px;
            border-radius: 6px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            white-space: normal;
            word-break: break-word;
        }

        .map-info-click-area:hover, .list-item.active .map-info-click-area {
            background-color: #222936;
        }

        .map-name {
            font-weight: bold;
            font-size: 22px;
            line-height: 1.3;
        }

        .item-detail-box {
            display: none;
            background-color: #131820;
            border-radius: 6px;
            margin-top: 15px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .list-item.active .item-detail-box {
            display: block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: bold;
            margin-top: 4px;
        }

        .loading-text {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 16px;
        }

        /* 📱 모바일 반응형 디자인 */
        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            header h1 { font-size: 16px; }
            .list-item { padding: 15px 15px; }
            .item-main-row { gap: 12px; }
            .rank { font-size: 16px; width: 30px; }
            .list-thumbnail { width: 110px; height: 62px; }
            .map-name { font-size: 17px; }
            .map-info-click-area { padding: 10px 5px; }
            .item-detail-box { padding: 12px; margin-top: 10px; }
            .info-value { font-size: 13px; }
            .info-label { font-size: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>GD QUALITY LEVEL LIST</h1>
        <div style="font-size: 14px; color: var(--text-muted);">LIVE TRACKING</div>
    </header>

    <div class="container">
        <div class="list-section" id="mapList">
            <div class="loading-text">구글 스프레드시트에서 실시간 순위표를 불러오는 중...</div>
        </div>
    </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSinNPA7weUWqy5wu9xgucDSkvtUuy5He_fRjKjBj38hB4NiPg8WdMwtqusFmYMLkECADgZvBRyeohO/pub?output=csv";

        function parseCSV(csvText) {
            const lines = csvText.split("\n");
            const headers = lines[0].split(",").map(h => h.trim());
            const result = [];

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                
                headers.forEach((header, index) => {
                    let value = currentline[index] ? currentline[index].trim() : "";
                    if (value.startsWith('"') && value.endsWith('"')) {
                        value = value.slice(1, -1);
                    }
                    obj[header] = value;
                });
                result.push(obj);
            }
            return result;
        }

        function getYoutubeThumbnail(url) {
            try {
                let videoId = '';
                if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                } else if (url.includes('youtube.com/embed/')) {
                    videoId = url.split('youtube.com/embed/')[1].split(/[?#]/)[0];
                } else if (url.includes('v=')) {
                    videoId = url.split('v=')[1].split('&')[0];
                } else {
                    videoId = url;
                }
                return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            } catch (e) {
                return 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="180" height="101" style="background:%23181d26;"></svg>';
            }
        }

        // 🎨 1. 등급별 컬러 세팅 (Unrated 추가 완료)
        function getRatingColor(rating) {
            if (!rating) return '#fff';
            const r = rating.toLowerCase().trim();
            if (r.includes('mythic')) return '#7dd3fc';     // 하늘색 계열
            if (r.includes('legendary')) return '#f472b6';  // 분홍색 계열
            if (r.includes('epic')) return '#ef4444';       // 빨간색
            if (r.includes('featured')) return '#fb923c';   // 주황색 계열
            if (r.includes('rated')) return '#94a3b8';      // 회색
            if (r.includes('unrated')) return '#475569';    // 🛠️ 어두운 슬레이트 회색 계열 추가!
            return '#e2e8f0'; 
        }

        // 📊 2. 오브젝트(OBJECTS) 개수별 초정밀 세분화 컬러 트리
        function getObjectsColor(objectsStr) {
            if (!objectsStr) return '#e2e8f0';
            const count = parseInt(objectsStr.replace(/[^0-9]/g, ''), 10);
            if (isNaN(count)) return '#e2e8f0';

            if (count >= 1000000) return '#ff0055'; // 100만 이상: 하이퍼 네온 핑크 레드
            if (count >= 750000) return '#ff3300';  // 75만 이상: 핫 파이어 레드
            if (count >= 500000) return '#ff7700';  // 50만 이상: 진한 다크 오렌지
            if (count >= 350000) return '#ffaa00';  // 35만 이상: 앰버 골드 (오렌지 옐로우)
            if (count >= 200000) return '#ffd700';  // 20만 이상: 브라이트 골드 (Tidal Wave 구역 ✨)
            if (count >= 150000) return '#d400ff';  // 15만 이상: 딥 마젠타 보라
            if (count >= 100000) return '#a855f7';  // 10만 이상: 일렉트릭 퍼플
            if (count >= 75000) return '#6366f1';   // 7만 5천 이상: 인디고 블루
            if (count >= 50000) return '#3b82f6';   // 5만 이상: 스카이 네온 블루
            if (count >= 25000) return '#06b6d4';   // 2만 5천 이상: 라이트 시안 터코이즈
            if (count >= 10000) return '#10b981';   // 1만 이상: 에메랄드 그린
            if (count >= 5000) return '#22c55e';    // 5천 이상: 선명한 연두색
            if (count >= 1000) return '#84cc16';    // 1천 이상: 라임 그린
            return '#64748b'; // 1000 미만: 차분한 다크 그레이
        }

        async function loadSheetData() {
            const listContainer = document.getElementById('mapList');
            
            try {
                const response = await fetch(`${sheetCsvUrl}&_ts=${Date.now()}`);
                const csvText = await response.text();
                const mapData = parseCSV(csvText);

                if (mapData.length === 0) {
                    listContainer.innerHTML = '<div class="loading-text">시트에 입력된 레벨 데이터가 없습니다.</div>';
                    return;
                }

                listContainer.innerHTML = '';

                mapData.forEach((map) => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    
                    const thumbUrl = getYoutubeThumbnail(map.videoUrl || "");
                    const rColor = getRatingColor(map.rating);
                    const oColor = getObjectsColor(map.objects);

                    item.innerHTML = `
                        <div class="item-main-row">
                            <div class="rank">#${map.rank || '-'}</div>
                            <div class="list-thumbnail" title="클릭 시 유튜브 영상 새 창 이동">
                                <img src="${thumbUrl}" alt="${map.name || 'Map'} thumbnail">
                            </div>
                            <div class="map-info-click-area" title="클릭 시 맵 상세 정보 보기">
                                <div class="map-name">${map.name || 'Unknown'}</div>
                            </div>
                        </div>
                        <div class="item-detail-box">
                            <div class="info-grid">
                                <div>
                                    <div class="info-label">OBJECTS</div>
                                    <div class="info-value" style="color: ${oColor};">${map.objects || '0'}</div>
                                </div>
                                <div>
                                    <div class="info-label">PUBLISHER</div>
                                    <div class="info-value" style="color: #3b82f6;">${map.publisher || '-'}</div>
                                </div>
                                <div>
                                    <div class="info-label">RATING</div>
                                    <div class="info-value" style="color: ${rColor};">${map.rating || 'None'}</div>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    const thumbBtn = item.querySelector('.list-thumbnail');
                    thumbBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (map.videoUrl) {
                            window.open(map.videoUrl, '_blank');
                        }
                    });

                    const infoBtn = item.querySelector('.map-info-click-area');
                    infoBtn.addEventListener('click', () => {
                        const isActive = item.classList.contains('active');
                        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
                        if (!isActive) {
                            item.classList.add('active');
                        }
                    });

                    listContainer.appendChild(item);
                });

            } catch (error) {
                console.error(error);
                listContainer.innerHTML = '<div class="loading-text" style="color:#ef4444;">시트 데이터를 불러오지 못했습니다. 스프레드시트 세팅을 확인해 주세요.</div>';
            }
        }

        loadSheetData();
    </script>
</body>
</html>
